name: MLOps Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  MLFLOW_TRACKING_URI: sqlite:///mlflow.db
  MLFLOW_ARTIFACT_ROOT: ./mlartifacts

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: |
          rm -rf mlruns/
          python -c "import mlflow; mlflow.set_tracking_uri('sqlite:///mlflow.db'); mlflow.set_experiment('Default')"
          pytest tests/ -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Authenticate to Cloud Storage
        run: |
          echo '${{ secrets.CLOUD_CREDENTIALS }}' > /tmp/sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json" >> $GITHUB_ENV
      - name: Pull data with DVC
        run: dvc pull
      - name: Train model
        run: python src/train.py
      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT
      - name: Upload model to Cloud Storage
        run: |
          python - <<'EOF'
          import os
          from google.cloud import storage
          client = storage.Client()
          bucket = client.bucket(os.environ["CLOUD_BUCKET"])
          blob = bucket.blob("models/latest/model.pkl")
          blob.upload_from_filename("models/model.pkl")
          print("Model uploaded successfully.")
          EOF
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Check eval gate
        run: |
          python - <<'EOF'
          import os, sys
          acc = float(os.environ.get("ACCURACY", 0))
          if acc < 0.65:
              print(f"Accuracy {acc} is below threshold 0.65. Deploy aborted.")
              sys.exit(1)
          print(f"Accuracy {acc} >= 0.65. Proceeding to deploy.")
          EOF
        env:
          ACCURACY: ${{ needs.train.outputs.accuracy }}

  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            for i in 1 2 3 4 5 6; do
              sleep 5
              curl -sf http://localhost:8000/health && exit 0
              echo "Attempt $i failed, retrying..."
            done
            exit 1
